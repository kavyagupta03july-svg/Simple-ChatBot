<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title> Simple Bot Chat</title>
    <link rel="icon" type="image/png" href="botlogo.png">
    <link rel="stylesheet" href="bot.css">
    
</head>
<body>
    <div id="content">
        <img src="chatbot.png" alt="">
        <h1>Welcome to My Bot Chat</h1> 
       <button id="chat-icon">Chat Now</button>
    </div>
       
         
      

    <div id="chat-container">
        <div id="chat-header">
            <div class="close-chat">←</div>
            <span>Chat Bot Assistant</span>
            <div class="reset-chat">
                <img src="logo.jpeg" alt="" ></div>
        </div>
        <div id="chat-box">
            <div id="messages"></div>
        </div>
        <div id="user-input-container">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-button">Send</button>
        </div>
    </div>
    <script src ="bot.js">
        

    </script>
</body>
</html>
